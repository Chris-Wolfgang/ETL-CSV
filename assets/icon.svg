<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64"
        fill="#290060"/>

  <!-- White border -->
  <rect x="32" y="32" width="448" height="448" rx="56" ry="56"
        fill="none" stroke="#FFFFFF" stroke-width="16"/>

  <!-- Document with folded corner -->
  <path d="M120 132 H228 L268 172 V280 H120 Z"
        fill="#FFFFFF"/>
  <!-- Folded corner triangle -->
  <path d="M228 132 V172 H268" fill="#290060"/>

  <!-- Grid inside document -->
  <rect x="140" y="160" width="108" height="96"
        fill="none" stroke="#290060" stroke-width="6"/>
  <line x1="176" y1="160" x2="176" y2="256"
        stroke="#290060" stroke-width="6"/>
  <line x1="212" y1="160" x2="212" y2="256"
        stroke="#290060" stroke-width="6"/>
  <line x1="140" y1="192" x2="248" y2="192"
        stroke="#290060" stroke-width="6"/>
  <line x1="140" y1="224" x2="248" y2="224"
        stroke="#290060" stroke-width="6"/>

  <!-- Arrow -->
  <line x1="280" y1="208" x2="336" y2="208"
        stroke="#FFFFFF" stroke-width="16" stroke-linecap="round"/>
  <polyline points="328,184 360,208 328,232"
            fill="none" stroke="#FFFFFF" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Database (cylinder) -->
  <!-- Top ellipse -->
  <ellipse cx="408" cy="184" rx="52" ry="20"
           fill="#FFFFFF"/>
  <!-- Middle band -->
  <rect x="356" y="184" width="104" height="56"
        fill="#FFFFFF"/>
  <ellipse cx="408" cy="240" rx="52" ry="20"
           fill="#FFFFFF"/>
  <!-- Bottom band -->
  <rect x="356" y="240" width="104" height="56"
        fill="#FFFFFF"/>
  <ellipse cx="408" cy="296" rx="52" ry="20"
           fill="#FFFFFF"/>

  <!-- ETL.CSV text -->
  <text x="256" y="380"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="64"
        font-weight="700">
    ETL.CSV
  </text>
</svg>
